<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SDG 3 Health Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

        html{
      scroll-behavior: smooth;
    }
body {
  background: #f4f7f6;
  font-family: Arial;
}

/* NAV */

 /* NAVBAR */
    nav {
      display: flex;
      position: fixed;
      justify-content: space-between;
      align-items: center;
      top: 0;
      width: 100%;
      background: #2E8B57;
      padding: 10px 80px;
      z-index: 1000;
    }

    nav div a{
      color: white;
      text-decoration: none;
      font-size: 24px;
      font-weight: bold;
      
    }

    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      margin-right: 200px;
    }

    nav ul li {
      margin: 0 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

/* HEADER */
.header {
  background: linear-gradient(135deg, #2E8B57, #4CAF50);
  color: white;
  padding: 40px;
  text-align: center;
  margin-top: 50px;
}

/* CARD */
.card {
  border: none;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

h5 {
  color: #2E8B57;
  font-weight: bold;
}

.btn-custom {
  background: #4CAF50;
  color: white;
  border-radius: 8px;
}

.btn-custom:hover {
  background: #388E3C;
}

.result {
  font-weight: bold;
  margin-top: 10px;
}

/* DASHBOARD SCORE */
.summary {
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- NAVIGATION -->
  <nav>
    <div>
      <a href="./index.html">Sustainable Development Goal 3</a>
    </div>
    <ul>
      <li><a href="./index.html">About</a></li>
      <li><a href="#problems">Problems</a></li>
      <li><a href="./exercise.html">Exercise</a></li>
      <li><a href="./healthcheck.html">Healthcheck</a></li>
    </ul>
  </nav>


<!-- <nav>SDG 3 Health Dashboard</nav> -->

<div class="header">
  <h1>Good Health & Well-being</h1>
  <p>Track your lifestyle, body, and mental health</p>
</div>

<div class="container mt-4">

  <!-- SUMMARY -->
  <div class="summary">
    <h4>🌟 Your Health Score</h4>
    <p id="totalScore">Not calculated yet</p>
    <button class="btn btn-custom" onclick="calculateTotal()">Calculate Overall Score</button>
  </div>

  <div class="row">

    <!-- BMI -->
    <div class="col-md-4">
      <div class="card p-3 mb-4">
        <h5>BMI</h5>
        <input type="number" id="height" class="form-control mb-2" placeholder="Height (cm)">
        <input type="number" id="weight" class="form-control mb-2" placeholder="Weight (kg)">
        <button class="btn btn-custom" onclick="calculateBMI()">Calculate</button>
        <p id="bmiResult" class="result"></p>
      </div>
    </div>

    <!-- WORKOUT -->
    <div class="col-md-4">
      <div class="card p-3 mb-4">
        <h5>Workout</h5>
        <select id="goal" class="form-control mb-2">
          <option value="">Goal</option>
          <option value="lose">Lose Weight</option>
          <option value="maintain">Maintain</option>
          <option value="gain">Gain Muscle</option>
        </select>
        <button class="btn btn-custom" onclick="generateWorkout()">Generate</button>
        <p id="workoutResult" class="result"></p>
      </div>
    </div>

    <!-- FOOD -->
    <div class="col-md-4">
      <div class="card p-3 mb-4">
        <h5>Nutrition</h5>
        <input type="number" id="water" class="form-control mb-2" placeholder="Water (cups)">
        <select id="foodQuality" class="form-control mb-2">
          <option value="low">Low Fruits</option>
          <option value="medium">Medium Fruits</option>
          <option value="high">High Fruits</option>
        </select>
        <button class="btn btn-custom" onclick="checkFood()">Check</button>
        <p id="foodResult" class="result"></p>
      </div>
    </div>

    <!-- MENTAL -->
    <div class="col-md-6">
      <div class="card p-3 mb-4">
        <h5>Mental Health</h5>
        <select id="mood" class="form-control mb-2">
          <option value="3">😊 Good</option>
          <option value="2">😐 Okay</option>
          <option value="1">😞 Bad</option>
        </select>
        <select id="stress" class="form-control mb-2">
          <option value="1">Low Stress</option>
          <option value="2">Medium</option>
          <option value="3">High</option>
        </select>
        <button class="btn btn-custom" onclick="checkMental()">Check</button>
        <p id="mentalResult" class="result"></p>
      </div>
    </div>

    <!-- LIFESTYLE -->
    <div class="col-md-6">
      <div class="card p-3 mb-4">
        <h5>Lifestyle</h5>
        <input type="number" id="sleepHours" class="form-control mb-2" placeholder="Sleep (hours)">
        <input type="number" id="exerciseMin" class="form-control mb-2" placeholder="Exercise (min)">
        <button class="btn btn-custom" onclick="calculateLifestyle()">Calculate</button>
        <p id="lifeResult" class="result"></p>
      </div>
    </div>

  </div>
</div>

<script>

let bmiScore = 0;
let lifestyleScore = 0;
let nutritionScore = 0;
let mentalScore = 0;

// BMI
function calculateBMI() {
  let h = height.value / 100;
  let w = weight.value;

  if (!h || !w) {
    bmiResult.innerText = "Enter valid values";
    return;
  }

  let bmi = (w / (h*h)).toFixed(1);
  let status = "";

  if (bmi < 18.5) {
    status = "Underweight";
    bmiScore = 10;
  } else if (bmi < 25) {
    status = "Normal";
    bmiScore = 30;
  } else if (bmi < 30) {
    status = "Overweight";
    bmiScore = 20;
  } else {
    status = "Obese";
    bmiScore = 10;
  }

  bmiResult.innerText = "BMI: " + bmi + " (" + status + ")";
}

if (bmi < 18.5) {
  bmiResult.innerText += " → Try eating more and strength training";
} else if (bmi < 25) {
  bmiResult.innerText += " → Keep maintaining your lifestyle!";
} else {
  bmiResult.innerText += " → Consider more exercise and balanced diet";
}

// Workout
function generateWorkout() {
  let g = goal.value;
  workoutResult.innerText =
    g === "lose" ? "Cardio + light strength" :
    g === "gain" ? "Heavy strength training" :
    g === "maintain" ? "Balanced workout" :
    "Select goal";
}

// Nutrition
function checkFood() {
  let w = parseInt(water.value) || 0;
  let f = foodQuality.value;

  nutritionScore = 0; // reset!

  if (w >= 8) nutritionScore += 20;
  else if (w >= 5) nutritionScore += 10;

  if (f === "high") nutritionScore += 20;
  else if (f === "medium") nutritionScore += 10;

  foodResult.innerText = "Nutrition score: " + nutritionScore + "/40";
}

// Mental
function checkMental() {
  let m = parseInt(mood.value);
  let s = parseInt(stress.value);

  mentalScore = (m - s + 3) * 10;

  mentalResult.innerText = "Mental score: " + mentalScore + "/60";
}

// Lifestyle
function calculateLifestyle() {
  let s = parseInt(sleepHours.value) || 0;
  let e = parseInt(exerciseMin.value) || 0;

  lifestyleScore = 0; // reset!

  if (s >= 7) lifestyleScore += 30;
  else if (s >= 5) lifestyleScore += 15;

  if (e >= 30) lifestyleScore += 30;
  else if (e >= 15) lifestyleScore += 15;

  lifeResult.innerText = "Lifestyle score: " + lifestyleScore + "/60";
}

// TOTAL
function calculateTotal() {
  let rawTotal = bmiScore + lifestyleScore + nutritionScore + mentalScore;

  // max possible = 190 (30 + 60 + 40 + 60)
  let maxScore = 190;

  // ✅ normalize to 100
  let total = Math.round((rawTotal / maxScore) * 100);

  let status = "";

  if (total >= 80) status = "🌟 Excellent";
  else if (total >= 50) status = "👍 Good";
  else status = "⚠️ Needs improvement";

  totalScore.innerText = "Total Score: " + total + "/100 (" + status + ")";
}

</script>

</body>
</html>
