<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exercise Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f4f7f6;
  font-family: Arial;
}

/* NAVBAR */
    nav {
      display: flex;
      position: fixed;
      justify-content: space-between;
      align-items: center;
      top: 0;
      width: 100%;
      background: #2E8B57;
      padding: 10px 80px;
      z-index: 1000;
    }

    nav div a{
      color: white;
      text-decoration: none;
      font-size: 24px;
      font-weight: bold;
      
    }

    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      margin-right: 200px;
    }

    nav ul li {
      margin: 0 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

.header {
  background: linear-gradient(135deg, #2E8B57, #4CAF50);
  color: white;
  text-align: center;
  padding: 40px;
  margin-top: 50px;
}

.card {
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  border: none;

}

#planResult{
    margin: 20px 0px;
}

.day {
  background: #ffffff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- NAVIGATION -->
  <nav>
    <div>
      <a href="./index.html">Sustainable Development Goal 3</a>
    </div>
    <ul>
      <li><a href="./index.html">About</a></li>
      <li><a href="#problems">Problems</a></li>
      <li><a href="./exercise.html">Exercise</a></li>
      <li><a href="./healthcheck.html">Healthcheck</a></li>
    </ul>
  </nav>

<div class="header">
  <h1>🏋️ Weekly Exercise Planner</h1>
  <p>Select your goal and get your routine</p>
</div>

<div class="container mt-4">

  <div class="card p-4 mb-4">
    <h5>Choose Your Goal</h5>

    <select id="goal" class="form-control mb-3">
      <option value="">Select Goal</option>
      <option value="lose">🔥 Lose Weight</option>
      <option value="maintain">⚖️ Maintain</option>
      <option value="gain">💪 Gain Muscle</option>
    </select>

    <button class="btn btn-success" onclick="generatePlan()">Generate Plan</button>
  </div>

  <div id="planResult"></div>

</div>

<script>
function generatePlan() {
  let goal = document.getElementById("goal").value;
  let result = "";

  if (!goal) {
    result = "<p>Please select a goal</p>";
  }

  // LOSE WEIGHT
  else if (goal === "lose") {
    result = `
      <div class="card p-4">
        <h5>🔥 Lose Weight Plan</h5>

        <div class="day">Mon: 30 min cardio + abs</div>
        <div class="day">Tue: HIIT workout</div>
        <div class="day">Wed: Rest / light walk</div>
        <div class="day">Thu: Cardio + legs</div>
        <div class="day">Fri: Full body workout</div>
        <div class="day">Sat: Jogging / cycling</div>
        <div class="day">Sun: Rest</div>
      </div>
    `;
  }

  // MAINTAIN
  else if (goal === "maintain") {
    result = `
      <div class="card p-4">
        <h5>⚖️ Maintain Plan</h5>

        <div class="day">Mon: Full body workout</div>
        <div class="day">Tue: Light cardio</div>
        <div class="day">Wed: Strength training</div>
        <div class="day">Thu: Rest</div>
        <div class="day">Fri: Core workout</div>
        <div class="day">Sat: Outdoor activity</div>
        <div class="day">Sun: Rest</div>
      </div>
    `;
  }

  // GAIN MUSCLE
  else if (goal === "gain") {
    result = `
      <div class="card p-4">
        <h5>💪 Gain Muscle Plan</h5>

        <div class="day">Mon: Chest + triceps</div>
        <div class="day">Tue: Back + biceps</div>
        <div class="day">Wed: Rest</div>
        <div class="day">Thu: Legs</div>
        <div class="day">Fri: Shoulders</div>
        <div class="day">Sat: Light cardio</div>
        <div class="day">Sun: Rest</div>
      </div>
    `;
  }

  document.getElementById("planResult").innerHTML = result;
}
</script>

</body>
</html>
